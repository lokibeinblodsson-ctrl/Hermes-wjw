name = "wild-jazmine-wellness"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "274c13cfc3476cfe884ae08648d73cb4"

# Static SPA assets (built by `npm run build:app` into ./public)
[assets]
directory = "./public"
binding = "ASSETS"

# Custom domain on the free workers.dev plan: Cloudflare provisions the DNS
# CNAME + Universal SSL + Worker routing for this hostname on deploy. A manual
# proxied CNAME (app -> <worker>.workers.dev) also exists in the zone as a
# fallback, but the route below is what makes the subdomain actually serve
# the Worker (a plain CNAME alone 522s).
[[routes]]
pattern = "app.wildjazminewellness.ca"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "wild-jazmine-wellness"
database_id = "a6a68f29-e6f9-49d6-b081-bee3a92cfc3e"
migrations_dir = "migrations"

# ── Daily business-continuity backup (Cron Triggers) ──
# Runs runDailyBackup() at 09:07 UTC (a "wrong" minute avoids the top-of-hour
# stampede). Requires B2_* secrets to be set via `wrangler secret put`. If B2
# is not configured, the handler no-ops in non-production and logs+throws in
# production (so a failed backup is visible in the dashboard).
[[triggers.crons]]
crons = ["7 9 * * *"]

# ── Local / dev / test values (committed dev placeholders) ──
# These are NON-SECRET dev stand-ins used by `wrangler dev` and the vitest
# suite. They are deliberately low-value and must NEVER hold real credentials.
# In production, set the sensitive ones via `wrangler secret put` (secrets and
# vars cannot share a name, so prod uses the same names — secrets override the
# committed placeholders at runtime; in production JWT_SECRET is REQUIRED or the
# worker fails closed):
#   wrangler secret put JWT_SECRET      # strong random; required in prod
#   wrangler secret put BOOTSTRAP_TOKEN # rotate; dev-only anyway
#   wrangler secret put ADMIN_EMAIL
#   wrangler secret put BREVO_API_KEY   # preferred free email (300/day, no CC)
#   wrangler secret put MAILCHANNELS_TOKEN  # legacy fallback (now needs CC)
#   wrangler secret put MAILCHANNELS_TOKEN
#   wrangler secret put B2_KEY_ID
#   wrangler secret put B2_APP_KEY
#   wrangler secret put B2_BUCKET_NAME
#   wrangler secret put B2_PUBLIC_URL   # e.g. https://s3.us-west-004.backblazeb2.com
#
# WARNING: Any value you type into [vars] below is committed to git. Only the
# dev placeholders belong here. Real secrets go in `wrangler secret put`.
[vars]
# BOOTSTRAP_TOKEN is a NON-SECRET dev placeholder (the real prod one is set via
# `wrangler secret put`). It is needed so `wrangler dev` and the vitest suite can
# bootstrap the admin. JWT_SECRET is intentionally NOT here — production requires
# it via `wrangler secret put`, and the worker fails closed without it.
BOOTSTRAP_TOKEN = "local-dev-only-bootstrap-replace-in-prod"
ADMIN_EMAIL = "loki.bein.blodsson@gmail.com"
# NOTE: ENVIRONMENT is intentionally NOT a [vars] entry. It is set per-environment
# via `wrangler secret put ENVIRONMENT` (value: "production" on the live worker).
# Hardcoding "development" here previously left the LIVE worker in dev mode (HSTS
# off, dev fallbacks active). The secret wins over [vars], so it must not also be
# declared here. Local `wrangler dev` falls back to development when the secret
# is absent, as intended.
